pre-commit:
    jobs:
        - run: pnpm run fix
          glob:
              - '*.js'
              - '*.jsx'
              - '*.ts'
              - '*.tsx'
              - '*.json'
              - '*.jsonc'
              - '*.yaml'
              - '*.yml'
              - '*.html'
              - '*.vue'
              - '*.hbs'
              - '*.handlebars'
              - '*.css'
              - '*.scss'
              - '*.less'
              - '*.graphql'
              - '*.gql'
              - '*.md'
              - '*.markdown'
          stage_fixed: true
